<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026釜山海岸賞櫻之旅</title>

    <!-- Google Fonts: Quicksand & Noto Sans TC -->
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Quicksand:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">

</head>

<body class="pb-32">
    <!-- Background Animation Container -->
    <div id="bg-animation-container"></div>

    <!-- Header & Flight Info -->
    <header id="main-header"
        class="coastal-gradient text-white pt-6 pb-12 px-6 rounded-b-[2.5rem] shadow-2xl relative overflow-hidden">
        <div class="absolute top-[-20px] right-[-20px] opacity-10 text-[8rem] rotate-12">
            <i class="fas fa-ship"></i>
        </div>

        <h1 class="text-3xl font-bold mb-1 tracking-tight drop-shadow-md">釜山海岸賞櫻之旅 🌊</h1>
        <p class="text-sky-100 text-sm mb-4 flex items-center gap-2 font-medium">
            <i class="fas fa-calendar-day"></i> 2026.03.29 - 04.04 (7天6夜)
        </p>

        <div class="grid grid-cols-1 gap-2 relative z-10">
            <div
                class="bg-white/10 backdrop-blur-lg border border-white/20 px-4 py-2 rounded-2xl flex items-center gap-4">
                <div class="bg-white/20 w-9 h-9 rounded-xl flex items-center justify-center">
                    <i class="fas fa-plane-departure"></i>
                </div>
                <div class="flex-1">
                    <span class="block opacity-60 text-[13px] font-bold uppercase tracking-wider">去程 3/29 · 濟州航空
                        7C6164</span>
                    <span class="font-bold">02:50 TPE → 06:10 PUS</span>
                </div>
            </div>
            <div
                class="bg-white/10 backdrop-blur-lg border border-white/20 px-4 py-2 rounded-2xl flex items-center gap-4">
                <div class="bg-white/20 w-9 h-9 rounded-xl flex items-center justify-center">
                    <i class="fas fa-plane-arrival"></i>
                </div>
                <div class="flex-1">
                    <span class="block opacity-60 text-[13px] font-bold uppercase tracking-wider">回程 4/4 · 德威航空
                        TW663</span>
                    <span class="font-bold">22:50 TAE → 00:25 TPE</span>
                </div>
            </div>
        </div>

        <!-- Waves SVG -->
        <svg class="waves-svg" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
            viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
            <defs>
                <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            </defs>
            <g class="parallax">
                <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(255,255,255,0.7)" />
                <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(255,255,255,0.5)" />
                <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(255,255,255,0.3)" />
                <use xlink:href="#gentle-wave" x="48" y="7" fill="#fff" />
            </g>
        </svg>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="px-4 mt-8">
        <!-- PLAN Section (Default) -->
        <section id="page-plan" class="tab-page">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-slate-800">精選行程</h2>
                <div class="text-sm bg-blue-100 text-blue-600 px-4 py-1.5 rounded-full font-bold">Day <span
                        id="current-day-label">1</span></div>
            </div>

            <!-- Day Selector -->
            <div class="flex gap-4 overflow-x-auto px-6 pt-1 pb-6 hide-scrollbar snap-x">
                <button onclick="switchDay(1)"
                    class="day-btn snap-center flex-shrink-0 px-6 py-4 rounded-3xl bg-white shadow-sm border border-slate-100 min-w-[100px] font-bold text-center active-day">
                    <span class="block text-[14px] opacity-50 uppercase mb-1">D1</span>
                    3/29
                </button>
                <button onclick="switchDay(2)"
                    class="day-btn snap-center flex-shrink-0 px-6 py-4 rounded-3xl bg-white shadow-sm border border-slate-100 min-w-[100px] font-bold text-center">
                    <span class="block text-[14px] opacity-50 uppercase mb-1">D2</span>
                    3/30
                </button>
                <button onclick="switchDay(3)"
                    class="day-btn snap-center flex-shrink-0 px-6 py-4 rounded-3xl bg-white shadow-sm border border-slate-100 min-w-[100px] font-bold text-center">
                    <span class="block text-[14px] opacity-50 uppercase mb-1">D3</span>
                    3/31
                </button>
                <button onclick="switchDay(4)"
                    class="day-btn snap-center flex-shrink-0 px-6 py-4 rounded-3xl bg-white shadow-sm border border-slate-100 min-w-[100px] font-bold text-center">
                    <span class="block text-[14px] opacity-50 uppercase mb-1">D4</span>
                    4/01
                </button>
                <button onclick="switchDay(5)"
                    class="day-btn snap-center flex-shrink-0 px-6 py-4 rounded-3xl bg-white shadow-sm border border-slate-100 min-w-[100px] font-bold text-center">
                    <span class="block text-[14px] opacity-50 uppercase mb-1">D5</span>
                    4/02
                </button>
                <button onclick="switchDay(6)"
                    class="day-btn snap-center flex-shrink-0 px-6 py-4 rounded-3xl bg-white shadow-sm border border-slate-100 min-w-[100px] font-bold text-center">
                    <span class="block text-[14px] opacity-50 uppercase mb-1">D6</span>
                    4/03
                </button>
                <button onclick="switchDay(7)"
                    class="day-btn snap-center flex-shrink-0 px-6 py-4 rounded-3xl bg-white shadow-sm border border-slate-100 min-w-[100px] font-bold text-center">
                    <span class="block text-[14px] opacity-50 uppercase mb-1">D7</span>
                    4/04
                </button>
            </div>

            <!-- Itinerary List -->
            <div id="itinerary-container" class="space-y-8 relative ml-2">
                <!-- Content will be injected by JS -->
            </div>

            <!-- Accommodation Card -->
            <div id="accommodation-card" class="mt-12 p-6 bg-orange-50 border border-orange-100 rounded-[2rem]">
                <div class="flex items-center gap-3 mb-3 text-orange-700">
                    <i class="fas fa-hotel text-xl"></i>
                    <h3 class="font-bold text-lg">今晚住宿</h3>
                </div>
                <p id="hotel-name" class="text-slate-800 font-bold text-xl">東橫inn釜山海雲台2</p>
            </div>
        </section>

        <!-- GUIDE Section -->
        <section id="page-guide" class="tab-page pt-4 hidden">
            <h2 class="text-3xl font-bold text-slate-800 mb-8">絕美釜山‧大邱</h2>
            <div id="guide-container" class="space-y-8">
                <!-- Guide content will be injected by JS -->
            </div>
        </section>

        <!-- CALCULATOR Section (舊名錢包) -->
        <section id="page-wallet" class="tab-page hidden">
            <div class="bg-white rounded-[2.5rem] p-5 shadow-2xl border border-slate-100 overflow-hidden">
                <!-- Top Info & Reset -->
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeFxRate()" id="fx-rate-display"
                        class="px-4 py-1.5 bg-sky-50 text-sky-600 rounded-full text-s font-bold tracking-wider active:scale-95 transition-transform">
                        匯率 1 : 46
                    </button>
                    <button onclick="resetCalculator()" class="text-slate-300 hover:text-red-500 transition-colors p-2">
                        <i class="fas fa-redo text-lg"></i>
                    </button>
                </div>

                <!-- Display Area -->
                <div class="space-y-2 mb-4">
                    <div class="relative">
                        <label
                            class="block text-[14px] font-black text-slate-300 uppercase tracking-widest mb-1 pl-2">KRW
                            (計算過程)</label>
                        <div id="calc-display"
                            class="w-full bg-slate-50 border-none px-6 py-3 rounded-2xl text-lg font-black text-right shadow-inner min-h-[60px] flex items-center justify-end break-all overflow-y-auto">
                            0</div>
                    </div>

                    <div class="bg-sky-600 p-4 rounded-[1.75rem] shadow-lg relative overflow-hidden">
                        <div class="absolute top-0 right-0 p-4 opacity-10">
                            <i class="fas fa-coins text-4xl text-white"></i>
                        </div>
                        <label
                            class="block text-[10px] font-black text-white/60 uppercase tracking-widest mb-1">TWD</label>
                        <div class="flex items-baseline justify-end gap-2">
                            <span id="res-twd" class="text-4xl font-black text-white tracking-tighter">0</span>
                            <span class="text-white/60 text-xs font-bold">元</span>
                        </div>
                    </div>
                </div>

                <!-- Keypad -->
                <div class="grid grid-cols-4 gap-1.5">
                    <button onclick="appendCalc('7')" class="calc-btn text-slate-700 bg-slate-50">7</button>
                    <button onclick="appendCalc('8')" class="calc-btn text-slate-700 bg-slate-50">8</button>
                    <button onclick="appendCalc('9')" class="calc-btn text-slate-700 bg-slate-50">9</button>
                    <button onclick="appendCalc('/')" class="calc-btn bg-sky-50 text-sky-600">÷</button>

                    <button onclick="appendCalc('4')" class="calc-btn text-slate-700 bg-slate-50">4</button>
                    <button onclick="appendCalc('5')" class="calc-btn text-slate-700 bg-slate-50">5</button>
                    <button onclick="appendCalc('6')" class="calc-btn text-slate-700 bg-slate-50">6</button>
                    <button onclick="appendCalc('*')" class="calc-btn bg-sky-50 text-sky-600">×</button>

                    <button onclick="appendCalc('1')" class="calc-btn text-slate-700 bg-slate-50">1</button>
                    <button onclick="appendCalc('2')" class="calc-btn text-slate-700 bg-slate-50">2</button>
                    <button onclick="appendCalc('3')" class="calc-btn text-slate-700 bg-slate-50">3</button>
                    <button onclick="appendCalc('-')" class="calc-btn bg-sky-50 text-sky-600">-</button>

                    <button onclick="appendCalc('0')" class="calc-btn text-slate-700 bg-slate-50">0</button>
                    <button onclick="appendCalc('.')" class="calc-btn text-slate-700 bg-slate-50">.</button>
                    <button onclick="clearCalc()" class="calc-btn bg-red-50 text-red-500 font-bold">C</button>
                    <button onclick="appendCalc('+')" class="calc-btn bg-sky-50 text-sky-600">+</button>
                </div>

                <!-- Equal Button Floating -->
                <button id="calc-equal-btn" onclick="performManualCalc()"
                    class="w-full mt-3 bg-emerald-500 text-white py-4 rounded-2xl shadow-lg active:scale-95 transition-all hidden flex items-center justify-center font-bold text-lg">
                    完成計算 (=)
                </button>
            </div>
            <div class="h-10"></div>
        </section>

        <!-- WEATHER Section (舊名工具) -->
        <section id="page-info" class="tab-page pt-4 hidden">
            <h2 class="text-3xl font-bold text-slate-800 mb-8">氣象概況</h2>

            <div class="space-y-8">
                <!-- Busan Card -->
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[3rem] p-1 shadow-2xl">
                    <div class="bg-black/10 backdrop-blur-sm p-8 rounded-[3rem] text-white">
                        <div class="flex items-center gap-3 mb-6">
                            <i class="fas fa-location-dot text-sky-300"></i>
                            <span class="text-xl font-bold">釜山 (Busan)</span>
                        </div>
                        <div id="weather-busan" class="min-h-[200px] flex flex-col justify-center items-center">
                            <div class="animate-pulse flex flex-col items-center gap-4">
                                <div class="w-16 h-16 bg-white/20 rounded-full"></div>
                                <div class="h-4 w-32 bg-white/20 rounded"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Daegu Card -->
                <div class="bg-gradient-to-br from-teal-500 to-emerald-700 rounded-[3rem] p-1 shadow-2xl">
                    <div class="bg-black/10 backdrop-blur-sm p-8 rounded-[3rem] text-white">
                        <div class="flex items-center gap-3 mb-6">
                            <i class="fas fa-location-dot text-teal-300"></i>
                            <span class="text-xl font-bold">大邱 (Daegu)</span>
                        </div>
                        <div id="weather-daegu" class="min-h-[200px] flex flex-col justify-center items-center">
                            <div class="animate-pulse flex flex-col items-center gap-4">
                                <div class="w-16 h-16 bg-white/20 rounded-full"></div>
                                <div class="h-4 w-32 bg-white/20 rounded"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-8 left-8 right-8 h-20 bg-white/90 backdrop-blur-xl border border-white/40 rounded-[2.5rem] shadow-[0_25px_60px_rgba(0,119,182,0.15)] z-50 flex items-center justify-around px-4">
        <button onclick="showPage('plan')" class="nav-btn nav-active flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-calendar-alt text-2xl"></i>
            <span class="text-[11px] font-bold">行程</span>
        </button>
        <button onclick="showPage('guide')"
            class="nav-btn text-slate-400 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-map-marked-alt text-2xl"></i>
            <span class="text-[11px] font-bold">導覽</span>
        </button>
        <button onclick="showPage('wallet')"
            class="nav-btn text-slate-400 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-calculator text-2xl"></i>
            <span class="text-[11px] font-bold">計算機</span>
        </button>
        <button onclick="showPage('info')"
            class="nav-btn text-slate-400 flex flex-col items-center gap-1 transition-all">
            <i class="fas fa-cloud-sun text-2xl"></i>
            <span class="text-[11px] font-bold">天氣</span>
        </button>
    </nav>

    <!-- Scripts -->
    <script src="script.js"></script>
</body>

</html>
